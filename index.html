<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pricing Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* ===== Global reset & base styles ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #222;
      line-height: 1.5;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .page-header h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }

    .page-header p {
      margin: 0;
      color: #555;
    }

    /* ===== Pricing grid layout (responsive) ===== */
    .pricing-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    /* Tablet */
    @media (min-width: 600px) {
      .pricing-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    /* Desktop */
    @media (min-width: 960px) {
      .pricing-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    /* ===== Pricing card component ===== */
    .pricing-card {
      background-color: #ffffff;
      border-radius: 0.75rem;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 260px;
    }

    .pricing-card__header {
      margin-bottom: 1rem;
    }

    .pricing-card__title {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
    }

    .pricing-card__subtitle {
      font-size: 0.9rem;
      margin: 0;
      color: #777;
    }

    .pricing-card__price {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f9d58;
      margin: 0.75rem 0 0;
    }

    .pricing-card__price span {
      font-size: 0.9rem;
      font-weight: 400;
      color: #666;
      margin-left: 0.25rem;
    }

    .pricing-card__features {
      list-style: none;
      padding-left: 0;
      margin: 1rem 0 1.5rem;
      border-top: 1px solid #eee;
    }

    .pricing-card__features li {
      padding: 0.5rem 0;
      border-bottom: 1px solid #f1f1f1;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .pricing-card__feature-bullet {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4f46e5;
      flex-shrink: 0;
    }

    /* ===== Button styles (interactive & accessible) ===== */
    .pricing-card__button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      border: none;
      background: #4f46e5;
      color: #ffffff;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition:
        background-color 0.15s ease,
        transform 0.1s ease,
        box-shadow 0.15s ease;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.35);
    }

    .pricing-card__button:hover {
      background: #4338ca;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.45);
    }

    .pricing-card__button:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
    }

    .pricing-card__button:focus-visible {
      outline: 3px solid #facc15;
      outline-offset: 2px;
    }

    .pricing-card__button[disabled],
    .pricing-card__button[aria-disabled="true"] {
      cursor: not-allowed;
      background: #9ca3af;
      box-shadow: none;
      transform: none;
    }

    /* Optional: highlight a "featured" card */
    .pricing-card--featured {
      border: 2px solid #4f46e5;
      transform: translateY(-4px);
    }

    .pricing-card--featured .pricing-card__subtitle {
      color: #4f46e5;
      font-weight: 600;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Choose your plan</h1>
      <p>Simple, transparent pricing for teams of all sizes.</p>
    </header>

    <!-- Container where cards will be rendered -->
    <section
      id="pricing-container"
      class="pricing-grid"
      aria-label="Pricing plans"
    ></section>
  </main>

  <script>
    /**
     * Creates a pricing card element.
     * @param {Object} options - Card data.
     * @param {string} options.title - Plan name.
     * @param {string} options.price - Plan price string (e.g. "$9.99").
     * @param {string} [options.billingPeriod="/month"] - Billing period label.
     * @param {string[]} options.features - List of feature strings.
     * @param {boolean} [options.featured=false] - Visually highlight this card.
     * @param {boolean} [options.disabled=false] - Disable the button.
     * @returns {HTMLElement} - The constructed card element.
     */
    function Card({ title, price, billingPeriod = "/month", features, featured = false, disabled = false }) {
      const card = document.createElement("article");
      card.className = "pricing-card";
      if (featured) {
        card.classList.add("pricing-card--featured");
        card.setAttribute("aria-label", title + " plan (recommended)");
      } else {
        card.setAttribute("aria-label", title + " plan");
      }

      // Header section
      const header = document.createElement("div");
      header.className = "pricing-card__header";

      const heading = document.createElement("h2");
      heading.className = "pricing-card__title";
      heading.textContent = title;

      const subtitle = document.createElement("p");
      subtitle.className = "pricing-card__subtitle";
      subtitle.textContent = featured ? "Most popular" : "Great value";

      const priceEl = document.createElement("p");
      priceEl.className = "pricing-card__price";
      priceEl.innerHTML = `${price} <span>${billingPeriod}</span>`;

      header.appendChild(heading);
      header.appendChild(subtitle);
      header.appendChild(priceEl);

      // Features list
      const list = document.createElement("ul");
      list.className = "pricing-card__features";

      features.forEach((featureText) => {
        const li = document.createElement("li");

        const bullet = document.createElement("span");
        bullet.className = "pricing-card__feature-bullet";
        bullet.setAttribute("aria-hidden", "true");

        const text = document.createElement("span");
        text.textContent = featureText;

        li.appendChild(bullet);
        li.appendChild(text);
        list.appendChild(li);
      });

      // Button (interactive, focusable, accessible)
      const button = document.createElement("button");
      button.className = "pricing-card__button";
      button.type = "button";
      button.textContent = "Start trial";

      button.setAttribute(
        "aria-label",
        `Start free trial for the ${title} plan at ${price} ${billingPeriod}`
      );

      if (disabled) {
        button.setAttribute("disabled", "true");
        button.setAttribute("aria-disabled", "true");
      }

      // Example click handler for interactivity
      button.addEventListener("click", () => {
        if (button.hasAttribute("disabled")) return;
        alert(`You selected the ${title} plan.`);
      });

      card.appendChild(header);
      card.appendChild(list);
      card.appendChild(button);

      return card;
    }

    // ===== Example usage: render 3 pricing cards with dynamic data =====
    const pricingData = [
      {
        title: "Basic Plan",
        price: "$9.99",
        billingPeriod: "/month",
        features: [
          "1 GB storage",
          "Basic email support",
          "Access to core features"
        ],
        featured: false
      },
      {
        title: "Pro Plan",
        price: "$19.99",
        billingPeriod: "/month",
        features: [
          "50 GB storage",
          "Priority chat & email support",
          "Advanced analytics",
          "Team collaboration tools"
        ],
        featured: true
      },
      {
        title: "Enterprise",
        price: "Contact us",
        billingPeriod: "",
        features: [
          "Unlimited storage",
          "Dedicated account manager",
          "Custom integrations",
          "Uptime SLA and security reviews"
        ],
        featured: false
      }
    ];

    const container = document.getElementById("pricing-container");
    pricingData.forEach((plan) => {
      const card = Card(plan);
      container.appendChild(card);
    });
  </script>
</body>
</html>
